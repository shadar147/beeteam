services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: beeteam
      POSTGRES_PASSWORD: beeteam
      POSTGRES_DB: beeteam
    ports:
      - "5432:5432"
    volumes:
      - ./.docker-data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beeteam"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: beeteam
      MINIO_ROOT_PASSWORD: beeteam-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.docker-data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - postgres
